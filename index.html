<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Upload Modal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background:#fff;
            padding:24px;
            border-radius:8px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
            max-width: 480px;
            margin: auto;
        }
        h3 { color:#333; margin-bottom:20px; }
        .query {
            margin-top:15px;
            background:#eee;
            padding:10px;
            border-radius:5px;
            font-family:monospace;
        }
        .notice {
            margin-top:12px;
            color:#d9534f;
            font-weight:bold;
        }
        button {
            margin-top:10px;
            padding:6px 12px;
            font-size:1rem;
        }
    </style>

    <!-- Teams JavaScript SDK (v2) -->
    <script src="https://unpkg.com/@microsoft/teams-js@2.22.0/dist/MicrosoftTeams.min.js"
            crossorigin="anonymous"></script>
</head>
<body>
<div class="container">
    <h3>File Upload Modal</h3>

    <div class="query">
        <p><strong>Conversation ID:</strong> <span id="cid">Loading…</span></p>
        <p><strong>First Name:</strong>   <span id="fn">Loading…</span></p>
        <p><strong>Last Name:</strong>    <span id="ln">Loading…</span></p>
    </div>

    <h3>Upload Document</h3>
    <input type="file" id="fileInput"/>
    <button onclick="upload()">Upload</button>

    <p id="status"></p>

    <p id="warn" class="notice" style="display:none;">
        ⚠️ This page is not running inside Microsoft Teams or the Teams SDK could not be loaded.
        The file will upload, but the bot will not receive the callback.
    </p>
</div>

<script>
    // -----------------------------------------------------------------
    // 1️⃣ Initialise the Teams SDK (v2, with v1 fallback)
    // -----------------------------------------------------------------
    let sdkReady = false;
    async function initSdk() {
        if (typeof microsoftTeams === "undefined") {
            console.warn("Teams SDK script did NOT load.");
            document.getElementById("warn").style.display = "block";
            return;
        }

        // v2 initialisation
        if (microsoftTeams.app && typeof microsoftTeams.app.initialize === "function") {
            await microsoftTeams.app.initialize();
            sdkReady = true;
        } else {
            // v1 fallback – works in older clients
            try {
                microsoftTeams.initialize();
                sdkReady = true;
            } catch (e) {
                console.error("Teams SDK init error:", e);
            }
        }

        // -----------------------------------------------------------------
        // 2️⃣ After init, pull the Teams context (conversation & user info)
        // -----------------------------------------------------------------
        if (sdkReady) {
            try {
                const ctx = await microsoftTeams.app.getContext();

                // Store the needed pieces on a global object for easy reuse
                window.context = {
                    conversationId: ctx.conversation?.conversationId ?? "",
                    email:          ctx.user?.email ?? "",
                    firstName:      ctx.user?.givenName ?? "",
                    lastName:       ctx.user?.surname ?? ""
                };

                // Populate the UI
                document.getElementById("cid").textContent = window.context.conversationId || "N/A";
                document.getElementById("fn").textContent  = window.context.firstName   || "N/A";
                document.getElementById("ln").textContent  = window.context.lastName    || "N/A";

                console.log("Teams context obtained:", window.context);
            } catch (e) {
                console.error("Failed to get Teams context:", e);
                document.getElementById("warn").style.display = "block";
            }
        }
    }

    // Run on page load
    initSdk();

    // -----------------------------------------------------------------
    // 3️⃣ Upload button handler – sends the result back to the bot
    // -----------------------------------------------------------------
    function upload() {
        const file   = document.getElementById('fileInput').files[0];
        const status = document.getElementById('status');

        if (!file) {
            status.textContent = "❌ No file selected!";
            return;
        }

        status.textContent = `✅ File "${file.name}" uploaded successfully!`;

        // -------------------------------------------------------------
        // Send the payload back to the bot (only if the SDK is ready)
        // -------------------------------------------------------------
        if (sdkReady && window.context) {
            const payload = {
                status:         "success",
                fileName:       file.name,
                conversationId: window.context.conversationId,
                firstName:      window.context.firstName,
                lastName:       window.context.lastName,
                email:          window.context.email        // optional – you can omit if not needed
            };

            console.log("Submitting task payload:", payload);
            microsoftTeams.tasks.submitTask(payload);
        } else {
            console.warn("Teams SDK not ready – submitTask skipped.");
        }
    }
</script>
</body>
</html>
