<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Upload</title>
  <script src="https://unpkg.com/@microsoft/teams-js@2.22.0/dist/MicrosoftTeams.min.js"></script>
  <style>
    body{font-family:"Segoe UI",sans-serif;padding:20px;background:#f5f5f5;margin:0}
    .container{max-width:700px;margin:0 auto;background:#fff;padding:20px;border-radius:8px}
    #status{margin-top:12px;font-weight:600}
  </style>
</head>
<body>
  <div class="container">
    <h2>Upload Document</h2>
    <input type="file" id="fileInput" />
    <button id="uploadBtn">Upload</button>
    <div id="status"></div>
  </div>

  <script>
    microsoftTeams.initialize();

    document.getElementById("uploadBtn").addEventListener("click", () => {
      const file = document.getElementById("fileInput").files[0];
      const status = document.getElementById("status");

      if (!file) {
        status.textContent = "❌ Please select a file.";
        return;
      }

      status.textContent = "Uploading...";

      const payload = {
        fileName: file.name
      };

      try {
        microsoftTeams.tasks.submitTask(payload);
      } catch (e) {
        status.textContent = "❌ submitTask failed.";
      }
    });
  </script>
</body>
</html>
