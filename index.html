<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Upload</title>
  <script src="https://unpkg.com/@microsoft/teams-js@2.22.0/dist/MicrosoftTeams.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      padding: 16px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      font-size: 22px;
      font-weight: 500;
      color: #2c2c2c;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .info {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 22px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      font-size: 11px;
      margin-bottom: 7px;
      color: #555;
      line-height: 1.4;
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-label {
      font-weight: 500;
      color: #444;
      min-width: 75px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .info-value {
      color: #666;
      word-break: break-word;
      font-family: "SF Mono", Monaco, monospace;
      font-size: 10px;
      opacity: 0.85;
    }

    .upload-section {
      margin-bottom: 18px;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
    }

    #fileInput {
      display: none;
    }

    .file-input-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border: 1.5px solid rgba(150, 150, 150, 0.25);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      color: #555;
      font-weight: 400;
      font-size: 13px;
      min-height: 54px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .file-input-label:hover {
      border-color: rgba(100, 100, 100, 0.3);
      background: rgba(255, 255, 255, 0.45);
      color: #333;
    }

    .file-input-label:active {
      transform: scale(0.98);
    }

    .file-icon {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .file-name-list {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
      display: none;
      text-align: center;
      line-height: 1.5;
      max-height: 90px;
      overflow-y: auto;
    }
    
    .file-name-list.active {
      display: block;
      color: #2c2c2c;
      font-weight: 500;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    button {
      padding: 12px 28px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }

    #uploadBtn {
      background: rgba(80, 130, 200, 0.8);
      color: white;
      flex: 1;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(80, 130, 200, 0.2);
    }

    #uploadBtn:hover {
      background: rgba(80, 130, 200, 0.95);
      box-shadow: 0 6px 20px rgba(80, 130, 200, 0.3);
    }

    #uploadBtn:active {
      transform: scale(0.97);
    }

    #uploadBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      margin-top: 14px;
      font-size: 12px;
      font-weight: 400;
      text-align: center;
      min-height: 16px;
      animation: fadeIn 0.3s ease;
      letter-spacing: 0.2px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    #status.error {
      color: #c1546b;
    }

    #status.success {
      color: #4a9d6f;
    }

    #status.loading {
      color: #5682c8;
    }

    @media (max-width: 480px) {
      .container {
        padding: 22px;
        border-radius: 16px;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 16px;
      }

      .info {
        padding: 12px;
        margin-bottom: 16px;
      }

      .info-item {
        font-size: 10px;
      }

      .file-input-label {
        padding: 16px;
        font-size: 12px;
      }

      button {
        padding: 10px 20px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Upload File(s)</h2>

    <div class="info">
      <div class="info-item">
        <span class="info-label">Conversation:</span>
        <span class="info-value" id="cid">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">Name:</span>
        <span class="info-value"><span id="fn">—</span> <span id="ln">—</span></span>
      </div>
      <div class="info-item">
        <span class="info-label">Email:</span>
        <span class="info-value" id="em">—</span>
      </div>
    </div>

    <div class="upload-section">
      <div class="file-input-wrapper">
        <label class="file-input-label" for="fileInput">
          <span class="file-icon">📎</span>
          <span>Select file(s)</span>
        </label>
        <input type="file" id="fileInput" multiple />
        <div class="file-name-list" id="fileNameList"></div>
      </div>
    </div>

    <div class="button-group">
      <button id="uploadBtn">Upload</button>
    </div>

    <div id="status"></div>
  </div>

  <script>
    microsoftTeams.initialize();

    const qs = new URLSearchParams(window.location.search);
    const context = {
      conversationId: qs.get("conversationId") || "",
      firstName: qs.get("firstName") || "",
      lastName: qs.get("lastName") || "",
      email: qs.get("email") || ""
    };

    document.getElementById("cid").textContent = context.conversationId || "N/A";
    document.getElementById("fn").textContent = context.firstName || "N/A";
    document.getElementById("ln").textContent = context.lastName || "N/A";
    document.getElementById("em").textContent = context.email || "N/A";

    const fileInput = document.getElementById("fileInput");
    const fileNameListDisplay = document.getElementById("fileNameList");
    const uploadBtn = document.getElementById("uploadBtn");
    const status = document.getElementById("status");

    // Update file name display when files are selected
    fileInput.addEventListener("change", (e) => {
      if (fileInput.files.length > 0) {
        let fileNamesHTML = `${fileInput.files.length} file(s) selected:<br>`;
        for(let i = 0; i < fileInput.files.length; i++) {
            fileNamesHTML += `✓ ${fileInput.files[i].name}<br>`;
        }
        fileNameListDisplay.innerHTML = fileNamesHTML;
        fileNameListDisplay.classList.add("active");
        status.textContent = "";
        status.classList.remove("error", "loading");
      } else {
        fileNameListDisplay.classList.remove("active");
        fileNameListDisplay.innerHTML = "";
      }
    });

    uploadBtn.addEventListener("click", () => {
      const files = fileInput.files;

      if (!files || files.length === 0) {
        status.textContent = "Please select at least one file";
        status.classList.remove("loading", "success");
        status.classList.add("error");
        return;
      }

      status.textContent = "Uploading...";
      status.classList.remove("error", "success");
      status.classList.add("loading");
      uploadBtn.disabled = true;

      const fileNames = Array.from(files).map(file => file.name);

      const payload = {
        fileNames: fileNames, // Changed from fileName to fileNames array
        conversationId: context.conversationId,
        firstName: context.firstName,
        lastName: context.lastName,
        email: context.email
      };

      try {
        microsoftTeams.tasks.submitTask(payload);
      } catch (e) {
        status.textContent = "Upload failed. Please try again.";
        status.classList.remove("loading", "success");
        status.classList.add("error");
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
