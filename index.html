<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload Modal</title>
  <style>
    body{margin:0;padding:20px;background:#f5f5f5;font-family:"Segoe UI",sans-serif}
    .container{max-width:760px;margin:0 auto;background:#fff;border-radius:10px;padding:22px;box-shadow:0 4px 14px rgba(0,0,0,.10)}
    .query{margin-top:10px;background:#f0f0f0;border:1px solid #e4e4e4;border-radius:8px;padding:14px;word-break:break-word;font-family:monospace}
    .row{margin-top:12px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
    button{border:1px solid #d1d1d1;background:#fff;border-radius:6px;padding:8px 16px;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    #status{margin-top:14px;font-weight:600;min-height:24px}
    .ok{color:#107c10}.err{color:#d13438}
  </style>
  <script src="https://unpkg.com/@microsoft/teams-js@2.22.0/dist/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h2>File Upload Modal</h2>

    <div class="query">
      <p><strong>Conversation ID:</strong> <span id="cid">Loading…</span></p>
      <p><strong>First Name:</strong> <span id="fn">Loading…</span></p>
      <p><strong>Last Name:</strong> <span id="ln">Loading…</span></p>
      <p><strong>Email:</strong> <span id="em">Loading…</span></p>
    </div>

    <h3>Upload Document</h3>
    <div class="row">
      <input type="file" id="fileInput" />
      <button id="uploadBtn" type="button">Upload</button>
    </div>
    <p id="status"></p>
  </div>

  <script>
    let busy = false;
    let teamsReady = false;

    const qs = new URLSearchParams(window.location.search);
    const context = {
      conversationId: qs.get("conversationId") || "",
      firstName: qs.get("firstName") || "",
      lastName: qs.get("lastName") || "",
      email: qs.get("email") || ""
    };

    document.getElementById("cid").textContent = context.conversationId || "N/A";
    document.getElementById("fn").textContent = context.firstName || "N/A";
    document.getElementById("ln").textContent = context.lastName || "N/A";
    document.getElementById("em").textContent = context.email || "N/A";

    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const statusEl = document.getElementById("status");

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = type || "";
    }

    function setBusy(flag) {
      busy = flag;
      uploadBtn.disabled = flag;
      fileInput.disabled = flag;
    }

    async function initTeams() {
      try {
        if (!window.microsoftTeams) return false;

        // init v2 app (safe)
        if (microsoftTeams.app?.initialize) {
          await microsoftTeams.app.initialize();
        } else if (microsoftTeams.initialize) {
          microsoftTeams.initialize();
        }

        // We REQUIRE legacy submit API in your host
        if (microsoftTeams.tasks?.submitTask) return true;

        return false;
      } catch (e) {
        console.error("Teams init error:", e);
        return false;
      }
    }

    async function upload() {
      if (busy) return;
      const file = fileInput.files?.[0];
      if (!file) return setStatus("❌ Please select a file first.", "err");

      setBusy(true);
      setStatus(`Uploading "${file.name}"...`);

      try {
        // Replace with real upload API call if needed
        await new Promise(r => setTimeout(r, 300));

        if (!teamsReady) {
          setStatus("❌ Teams API not ready (tasks.submitTask unavailable).", "err");
          setBusy(false);
          return;
        }

        const payload = {
          status: "success",
          fileName: file.name,
          conversationId: context.conversationId,
          firstName: context.firstName,
          lastName: context.lastName,
          email: context.email,
          uploadedAt: new Date().toISOString()
        };

        // CRITICAL: your tenant requires this path
        microsoftTeams.tasks.submitTask(payload);

        setStatus("✅ Upload successful. Payload sent to Copilot Studio.", "ok");
      } catch (e) {
        console.error(e);
        setStatus(`❌ Upload done, but failed to send payload: ${e.message}`, "err");
        setBusy(false);
      }
    }

    uploadBtn.addEventListener("click", upload);

    (async () => {
      teamsReady = await initTeams();
      if (!teamsReady) {
        setStatus("❌ This Teams host does not expose tasks.submitTask.", "err");
      }
    })();
  </script>
</body>
</html>
