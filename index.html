<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload Modal</title>

  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #666;
      --ok: #107c10;
      --err: #d13438;
      --border: #d1d1d1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 10px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .10);
    }

    h2 {
      margin: 0 0 14px 0;
      font-size: 28px;
      line-height: 1.2;
    }

    h3 {
      margin: 18px 0 10px;
      font-size: 22px;
      line-height: 1.2;
    }

    .query {
      margin-top: 10px;
      background: #f0f0f0;
      border: 1px solid #e4e4e4;
      border-radius: 8px;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      word-break: break-word;
    }

    .query p { margin: 8px 0; }

    .row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    input[type="file"] { max-width: 100%; }

    button {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 14px;
      font-weight: 600;
      min-height: 24px;
    }

    .ok { color: var(--ok); }
    .err { color: var(--err); }

    .notice {
      margin-top: 12px;
      color: var(--err);
      font-weight: 600;
      display: none;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>

  <!-- Teams JS SDK v2 -->
  <script src="https://unpkg.com/@microsoft/teams-js@2.22.0/dist/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h2>File Upload Modal</h2>

    <div class="query">
      <p><strong>Conversation ID:</strong> <span id="cid">Loading…</span></p>
      <p><strong>First Name:</strong> <span id="fn">Loading…</span></p>
      <p><strong>Last Name:</strong> <span id="ln">Loading…</span></p>
      <p><strong>Email:</strong> <span id="em">Loading…</span></p>
    </div>

    <h3>Upload Document</h3>
    <div class="row">
      <input type="file" id="fileInput" />
      <button id="uploadBtn" type="button">Upload</button>
    </div>

    <p id="status"></p>
    <p class="hint">After successful upload, data is sent back to Copilot Studio.</p>

    <p id="warn" class="notice">
      ⚠️ Teams SDK unavailable. Upload UI works, but payload cannot be sent to bot.
    </p>
  </div>

  <script>
    let sdkReady = false;
    let busy = false;

    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const statusEl = document.getElementById("status");
    const warnEl = document.getElementById("warn");

    const qs = new URLSearchParams(window.location.search);
    const context = {
      conversationId: qs.get("conversationId") || "",
      firstName: qs.get("firstName") || "",
      lastName: qs.get("lastName") || "",
      email: qs.get("email") || ""
    };

    document.getElementById("cid").textContent = context.conversationId || "N/A";
    document.getElementById("fn").textContent = context.firstName || "N/A";
    document.getElementById("ln").textContent = context.lastName || "N/A";
    document.getElementById("em").textContent = context.email || "N/A";

    async function initTeamsSdk() {
      try {
        if (typeof microsoftTeams === "undefined") {
          warnEl.style.display = "block";
          return;
        }
        if (microsoftTeams.app?.initialize) {
          await microsoftTeams.app.initialize();
          sdkReady = true;
          return;
        }
        warnEl.style.display = "block";
      } catch (e) {
        console.error("Teams SDK init failed:", e);
        warnEl.style.display = "block";
      }
    }

    function setBusy(isBusy) {
      busy = isBusy;
      uploadBtn.disabled = isBusy;
      fileInput.disabled = isBusy;
    }

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.classList.remove("ok", "err");
      if (type === "ok") statusEl.classList.add("ok");
      if (type === "err") statusEl.classList.add("err");
    }

    function submitToBot(payload) {
      // v2 only (intentional)
      if (microsoftTeams?.dialog?.submit) {
        microsoftTeams.dialog.submit(payload);
        return true;
      }
      return false;
    }

    async function upload() {
      if (busy) return;

      const file = fileInput.files?.[0];
      if (!file) {
        setStatus("❌ Please select a file first.", "err");
        return;
      }

      setBusy(true);
      setStatus(`Uploading "${file.name}"...`);

      try {
        // Replace with real upload API if needed
        await new Promise(r => setTimeout(r, 300));

        const payload = {
          status: "success",
          fileName: file.name,
          conversationId: context.conversationId,
          firstName: context.firstName,
          lastName: context.lastName,
          email: context.email,
          uploadedAt: new Date().toISOString()
        };

        if (!sdkReady) {
          setStatus("❌ Upload done, but Teams SDK not ready.", "err");
          warnEl.style.display = "block";
          setBusy(false);
          return;
        }

        const ok = submitToBot(payload);
        if (!ok) {
          setStatus("❌ Upload done, but dialog.submit API is unavailable.", "err");
          setBusy(false);
          return;
        }

        setStatus("✅ Upload successful. Sending data to bot...", "ok");
        // Dialog will close after submit when Teams handles it.
      } catch (err) {
        console.error(err);
        setStatus("❌ Upload failed. Please try again.", "err");
        setBusy(false);
      }
    }

    uploadBtn.addEventListener("click", upload);
    initTeamsSdk();
  </script>
</body>
</html>
