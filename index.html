<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload Modal</title>
  <style>
    body{font-family:"Segoe UI",sans-serif;margin:0;padding:20px;background:#f5f5f5}
    .container{background:#fff;max-width:760px;margin:0 auto;padding:20px;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.1)}
    .query{background:#f0f0f0;padding:12px;border-radius:8px;word-break:break-word}
    .row{margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    #status{margin-top:12px;font-weight:600}
    .ok{color:#107c10}.err{color:#d13438}.hint{color:#666;font-size:13px}
  </style>
  <script src="https://unpkg.com/@microsoft/teams-js@2.22.0/dist/MicrosoftTeams.min.js"></script>
</head>
<body>
  <div class="container">
    <h2>File Upload Modal</h2>
    <div class="query">
      <div><b>Conversation ID:</b> <span id="cid"></span></div>
      <div><b>First Name:</b> <span id="fn"></span></div>
      <div><b>Last Name:</b> <span id="ln"></span></div>
      <div><b>Email:</b> <span id="em"></span></div>
    </div>

    <h3>Upload Document</h3>
    <div class="row">
      <input type="file" id="fileInput" />
      <button id="uploadBtn" type="button">Upload</button>
    </div>
    <div id="status"></div>
    <div class="hint">After upload, data is sent to bot. Then close this window using the top-right ✕.</div>
  </div>

  <script>
    let sdkReady = false;
    const qs = new URLSearchParams(window.location.search);
    const context = {
      conversationId: qs.get("conversationId") || "",
      firstName: qs.get("firstName") || "",
      lastName: qs.get("lastName") || "",
      email: qs.get("email") || ""
    };

    document.getElementById("cid").textContent = context.conversationId || "N/A";
    document.getElementById("fn").textContent = context.firstName || "N/A";
    document.getElementById("ln").textContent = context.lastName || "N/A";
    document.getElementById("em").textContent = context.email || "N/A";

    (async function init(){
      try{
        if (window.microsoftTeams?.app?.initialize) {
          await microsoftTeams.app.initialize();
          sdkReady = true;
        } else if (window.microsoftTeams?.initialize) {
          microsoftTeams.initialize();
          sdkReady = true;
        }
      } catch(e){ console.error(e); }
    })();

    function setStatus(msg, ok){
      const el = document.getElementById("status");
      el.className = ok ? "ok" : "err";
      el.textContent = msg;
    }

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return setStatus("❌ Please select a file.", false);

      // your real upload logic can go here
      setStatus(`✅ "${file.name}" uploaded. Sending payload...`, true);

      const payload = {
        status: "success",
        fileName: file.name,
        conversationId: context.conversationId,
        firstName: context.firstName,
        lastName: context.lastName,
        email: context.email
      };

      try {
        if (!sdkReady) throw new Error("Teams SDK not ready");

        if (microsoftTeams?.dialog?.submit) {
          microsoftTeams.dialog.submit(payload);
        } else if (microsoftTeams?.tasks?.submitTask) {
          microsoftTeams.tasks.submitTask(payload);
        } else {
          throw new Error("No Teams submit API found");
        }

        setStatus("✅ Payload sent to bot. Please close this window using ✕.", true);
      } catch (e) {
        console.error(e);
        setStatus("❌ Upload done but could not send payload to bot.", false);
      }
    });
  </script>
</body>
</html>
