<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Uploader</title>
    <style>
        body {font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
              padding:20px; background:#f5f5f5;}
        .container {background:#fff;padding:24px;border-radius:8px;
                    box-shadow:0 4px 12px rgba(0,0,0,.1);}
        h3 {color:#333;margin-bottom:20px;}
        .query-param {margin-top:15px;background:#eee;padding:10px;
                      border-radius:5px;font-family:monospace;}
        .notice {margin-top:12px;color:#d9534f;font-weight:bold;}
    </style>

    <!-- 1️⃣ Load the Teams JavaScript SDK (required for submitTask) -->
    <script src="https://statics.teams.cdn.office.net/sdk/v1.15.0/js/MicrosoftTeams.min.js"
            integrity="sha384-9Y4WYs5fV8CSk1jDlK0F8pOPFf8M8BYxUgf1y5ao6vNVg7j/dpE8Rflv4xYLUIOO"
            crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h3>File Upload Modal with Debugging</h3>

        <div id="paramsContainer" class="query-param">
            <p><strong>Conversation ID:</strong> <span id="conversationId">Loading…</span></p>
            <p><strong>First Name:</strong>   <span id="firstName">Loading…</span></p>
            <p><strong>Last Name:</strong>    <span id="lastName">Loading…</span></p>
        </div>

        <div id="fileUploadSection">
            <h3>Upload Document</h3>
            <p>Select a file from your device.</p>
            <input type="file" id="fileInput" />
            <button onclick="uploadFileComplete()">Upload</button>
            <p id="status"></p>
        </div>

        <!-- Optional friendly notice when the SDK is not available -->
        <p id="sdkNotice" class="notice" style="display:none;">
            ⚠️ This page is not running inside Microsoft Teams. The upload will work, but the
            result will **not** be sent back to the bot.
        </p>
    </div>

    <script>
        // -----------------------------------------------------------------
        // 2️⃣ Initialise the Teams SDK – must be done before any Teams call
        // -----------------------------------------------------------------
        function initTeamsSdk() {
            if (typeof microsoftTeams === "undefined") {
                // SDK script didn’t load (e.g., page opened outside Teams)
                console.warn("Microsoft Teams SDK not available.");
                document.getElementById("sdkNotice").style.display = "block";
                return false;
            }

            // The SDK provides two initialise signatures:
            //   - old: microsoftTeams.initialize()
            //   - new (v2+): microsoftTeams.app.initialize()
            // We'll call the older one for maximum compatibility.
            try {
                microsoftTeams.initialize();
            } catch (e) {
                // Fallback for newer SDK versions
                if (microsoftTeams.app && typeof microsoftTeams.app.initialize === "function") {
                    microsoftTeams.app.initialize();
                } else {
                    console.error("Failed to initialise Teams SDK:", e);
                }
            }
            return true;
        }

        // Run initialise as soon as the script is parsed (still before DOMReady)
        const isTeamsReady = initTeamsSdk();

        // -----------------------------------------------------------------
        // Helper – read query parameters from the URL
        // -----------------------------------------------------------------
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // -----------------------------------------------------------------
        // Extract parameters on page load (just for display / debug)
        // -----------------------------------------------------------------
        const context = {
            conversationId: getQueryParam("conversationId"),
            firstName:      getQueryParam("firstName"),
            lastName:       getQueryParam("lastName")
        };
        document.getElementById("conversationId").textContent = context.conversationId || "Not Found";
        document.getElementById("firstName").textContent   = context.firstName      || "Not Found";
        document.getElementById("lastName").textContent    = context.lastName       || "Not Found";

        // -----------------------------------------------------------------
        // 3️⃣ Called when the user clicks **Upload**
        // -----------------------------------------------------------------
        function uploadFileComplete() {
            const fileInput = document.getElementById('fileInput');
            const file      = fileInput.files[0];
            const status    = document.getElementById('status');

            if (!file) {
                status.textContent = "❌ No file selected or upload failed!";
                return;
            }

            // -------------------------------------------------------------
            // Here you could replace the setTimeout with a real upload call.
            // For the minimal‑change demo we simply simulate success.
            // -------------------------------------------------------------
            status.textContent = `✅ File "${file.name}" uploaded successfully!`;

            // -------------------------------------------------------------
            // 4️⃣ Send data back to Copilot Studio via submitTask (if SDK ready)
            // -------------------------------------------------------------
            if (isTeamsReady && typeof microsoftTeams !== "undefined") {
                microsoftTeams.tasks.submitTask({
                    status:         "success",
                    fileName:       file.name,
                    conversationId: context.conversationId,
                    firstName:      context.firstName,
                    lastName:       context.lastName
                });
            } else {
                console.warn("Teams SDK not loaded – submitTask() skipped.");
                // Optional: you could still store the data somewhere else here.
            }
        }
    </script>
</body>
</html>
